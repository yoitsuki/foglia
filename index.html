  <!-- Reactアプリの本体 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Folder, FolderOpen, FileText, Plus, Edit2, Trash2, 
      Menu, X, ChevronRight, ChevronDown, ChevronLeft,
      Copy, Check, Palette, Home, Save, Settings, Monitor,
      ArrowUp, ArrowDown, Edit3, Type, Database, Upload, Download, RefreshCw, Clock, Link,

    } from 'lucide-react';

    // --- Theme & Font Definitions ---
    const themes = [
      { id: 'paleblue', name: 'ペールブルー (標準)', color: '#bae6fd' },
      { id: 'pink', name: 'マカロンピンク', color: '#fbcfe8' },
      { id: 'red', name: 'ストロベリーレッド', color: '#fca5a5' },
      { id: 'green', name: 'ミントグリーン', color: '#86efac' },
      { id: 'dark', name: 'ナイトダーク', color: '#1e293b' },
    ];

    const fonts = [
      { id: 'notoSans', name: 'Noto Sans (標準ゴシック)', family: "'Noto Sans JP', sans-serif" },
      { id: 'notoSerif', name: 'Noto Serif (明朝体)', family: "'Noto Serif JP', serif" },
      { id: 'mplus', name: 'M PLUS Rounded (丸ゴシック)', family: "'M PLUS Rounded 1c', sans-serif" },
      { id: 'kaisei', name: 'Kaisei Decol (レトロ)', family: "'Kaisei Decol', serif" },
      { id: 'zenKaku', name: 'Zen Kaku (角ゴシック)', family: "'Zen Kaku Gothic New', sans-serif" },
    ];

    const themeCSS = `
      @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Kaisei+Decol&family=M+PLUS+Rounded+1c:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

      }

      [data-theme="dark"] {

        --sidebar-bg: #1e293b;
        --sidebar-hover: #334155;
        --sidebar-active: #38bdf8;
        --sidebar-text: #f1f5f9;
        --card-bg: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --primary: #38bdf8;
        --primary-dark: #7dd3fc;
        --primary-text: #e0f2fe;
        --border: #334155;
        --shadow-color: rgba(0, 0, 0, 0.5);
        --btn-bg: #334155;

      }

      [data-theme="pink"] {

        --sidebar-text: #4a044e; --card-bg: #ffffff; --text-main: #475569; --text-muted: #94a3b8;
        --primary: #f9a8d4; --primary-dark: #f472b6; --primary-text: #9d174d; --border: #fbcfe8;
        --shadow-color: rgba(249, 168, 212, 0.25); --btn-bg: #fce7f3; --modal-close: #4a044e;
      }

      [data-theme="red"] {
        --bg-color: #fef2f2; --sidebar-bg: #fee2e2; --sidebar-hover: #fecaca; --sidebar-active: #fca5a5;
        --sidebar-text: #450a0a; --card-bg: #ffffff; --text-main: #450a0a; --text-muted: #991b1b;
        --primary: #fca5a5; --primary-dark: #ef4444; --primary-text: #7f1d1d; --border: #fecaca;
        --shadow-color: rgba(248, 113, 113, 0.2); --btn-bg: #fee2e2; --modal-close: #450a0a;
      }

      [data-theme="green"] {
        --bg-color: #f0fdf4; --sidebar-bg: #dcfce7; --sidebar-hover: #bbf7d0; --sidebar-active: #86efac;
        --sidebar-text: #052e16; --card-bg: #ffffff; --text-main: #14532d; --text-muted: #166534;
        --primary: #86efac; --primary-dark: #4ade80; --primary-text: #14532d; --border: #bbf7d0;
        --shadow-color: rgba(134, 239, 172, 0.25); --btn-bg: #dcfce7; --modal-close: #052e16;
      }

      [data-font="notoSans"] { --font-family: 'Noto Sans JP', sans-serif; }
      [data-font="notoSerif"] { --font-family: 'Noto Serif JP', serif; }
      [data-font="mplus"] { --font-family: 'M PLUS Rounded 1c', sans-serif; }
      [data-font="kaisei"] { --font-family: 'Kaisei Decol', serif; }
      [data-font="zenKaku"] { --font-family: 'Zen Kaku Gothic New', sans-serif; }

      body { font-family: var(--font-family, 'Noto Sans JP', sans-serif); background-color: var(--bg-color); color: var(--text-main); transition: background-color 0.3s ease; }
      .toast-anim { animation: toastIn 3s ease-in-out forwards; }
      @keyframes toastIn { 0% { opacity: 0; transform: translate(-50%, 20px); } 10% { opacity: 1; transform: translate(-50%, 0); } 90% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -20px); } }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
      
      .dragging-card { opacity: 0.5; transform: scale(0.98); box-shadow: 0 10px 25px var(--shadow-color); border: 2px dashed var(--primary); }
    `;

    // --- Helpers ---
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const generateUUID = () => {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => (Math.random() * 16 | 0).toString(16));
    };
    const formatDate = (ts) => {
      if (!ts) return '';
      const date = new Date(ts);
      return `${date.getFullYear()}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
    };

    // --- GAS Script String (Updated for split cells) ---
    const gasCodeString = `function doPost(e) {
      const contents = JSON.parse(e.postData.contents);
      const action = contents.action;
      const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
      const CHUNK_SIZE = 40000;
      
      if (action === 'check') {
        const lastRow = sheet.getLastRow();
        const hasData = lastRow >= 1 && sheet.getRange(lastRow, 1).getValue() !== "";
        return ContentService.createTextOutput(JSON.stringify({status: 'success', hasData: hasData})).setMimeType(ContentService.MimeType.JSON);
      }
      
      if (action === 'save') {
        const isFirstSync = contents.isFirstSync;
        const lastRow = sheet.getLastRow();
        const dataStr = contents.data;
        
        // データをチャンクに分割 (1セル50000文字制限対策)
        const chunks = [];
        for (let i = 0; i < dataStr.length; i += CHUNK_SIZE) {
          chunks.push(dataStr.substring(i, i + CHUNK_SIZE));
        }
        
        // 日付を先頭にし、その後に分割したデータを配置
        const rowData = [new Date(), ...chunks];
        
        if (isFirstSync || lastRow === 0) {
          sheet.appendRow(rowData);
        } else {
          // 上書き時は該当行をクリアしてからセット
          const maxCol = sheet.getLastColumn();
          if (maxCol > 0) {
            sheet.getRange(lastRow, 1, 1, maxCol).clearContent();
          }
          sheet.getRange(lastRow, 1, 1, rowData.length).setValues([rowData]);
        }
        return ContentService.createTextOutput(JSON.stringify({status: 'success'})).setMimeType(ContentService.MimeType.JSON);
      }
      
      if (action === 'load') {
        const lastRow = sheet.getLastRow();
        if (lastRow === 0) {
          return ContentService.createTextOutput(JSON.stringify({status: 'success', data: null})).setMimeType(ContentService.MimeType.JSON);
        }
        const maxCol = sheet.getLastColumn();
        if (maxCol <= 1) {
           return ContentService.createTextOutput(JSON.stringify({status: 'success', data: ""})).setMimeType(ContentService.MimeType.JSON);
        }
        
        // 2列目から最後までを取得して結合
        const values = sheet.getRange(lastRow, 2, 1, maxCol - 1).getValues()[0];
        const data = values.join("");
        
        return ContentService.createTextOutput(JSON.stringify({status: 'success', data: data})).setMimeType(ContentService.MimeType.JSON);
      }
    }`;

    // --- Memo Card Component ---
    function MemoCard({ memo, isEditing, displayMode, isMemoEditMode, textVariables, onStartEdit, onSave, onCancel, onDelete, onMove, onToggleFavorite, onMoveUp, onMoveDown, showToast }) {
      const [editTitle, setEditTitle] = useState(memo.title || '');
      const [editContent, setEditContent] = useState(memo.content || '');
      const [copied, setCopied] = useState(false);
      const [showFavToast, setShowFavToast] = useState(false);
      
      const textAreaRef = useRef(null);
      const highlightRef = useRef(null);

      useEffect(() => { if (isEditing) { setEditTitle(memo.title || ''); setEditContent(memo.content || ''); } }, [isEditing, memo]);

      const handleScroll = (e) => {
        if (highlightRef.current) {
          highlightRef.current.scrollTop = e.target.scrollTop;
        }
      };

      const handleCopy = () => {
        let textToCopy = memo.content || '';
        
        // 変数（時間帯に応じた挨拶など）の置換処理
        if (textVariables && textVariables.length > 0) {
          const now = new Date();
          const currentStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
          
          textVariables.forEach(variable => {
            if (!variable.placeholder) return;
            let replacement = '';
            const m = variable.morningStart || '05:00';
            const d = variable.dayStart || '11:00';
            const n = variable.nightStart || '18:00';
            
            // 現在時刻と設定時間の比較
            if (currentStr >= m && currentStr < d) {
              replacement = variable.morningText || '';
            } else if (currentStr >= d && currentStr < n) {
              replacement = variable.dayText || '';
            } else {
              replacement = variable.nightText || '';
            }
            
            // プレースホルダーをすべて置換（正規表現エスケープ処理込み）
            const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(escapeRegExp(variable.placeholder), 'g');
            textToCopy = textToCopy.replace(regex, replacement);
          });
        }

        const textArea = document.createElement("textarea");
        textArea.value = textToCopy;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        textArea.remove();
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const handleFavoriteClick = (e) => {
        e.stopPropagation();
        onToggleFavorite(memo.id);
        if (!memo.isFavorite) {
          setShowFavToast(true);
          setTimeout(() => setShowFavToast(false), 2000);
        }
      };

      const handlePaste = async (setter, append = false) => {
        try {
          const text = await navigator.clipboard.readText();
          if (append) {
             setter(prev => prev + text);
          } else {
             setter(text);
          }
        } catch (err) {
          console.error('Failed to read clipboard', err);
          if (showToast) showToast('クリップボードの読み取りが許可されていません');
        }
      };

      if (isEditing) {
        return (
          <div className="bg-[var(--card-bg)] p-5 rounded-3xl shadow-lg border border-[var(--border)] mb-4 animate-in fade-in zoom-in duration-200 relative">
            <div className="relative mb-3 flex items-center">
              <input value={editTitle} onChange={e => setEditTitle(e.target.value)} className="w-full text-lg font-bold p-2 pr-16 border-b-2 border-[var(--bg-color)] bg-transparent focus:outline-none focus:border-[var(--primary)] text-[var(--text-main)]" placeholder="タイトル" autoFocus />
              <div className="absolute right-0 flex items-center gap-1">
                <button onClick={() => handlePaste(setEditTitle, false)} className="p-1.5 text-[var(--text-muted)] md:hover:text-[var(--primary-dark)] bg-transparent rounded-lg transition-colors" title="貼り付け"><Clipboard size={16}/></button>
                {editTitle && <button onClick={() => setEditTitle('')} className="p-1.5 text-[var(--text-muted)] md:hover:text-red-500 bg-transparent rounded-lg transition-colors" title="クリア"><X size={16}/></button>}
              </div>
            </div>
            
            {/* テキスト入力＆はみ出しハイライト領域 */}
            <div className="relative rounded-2xl bg-[var(--bg-color)] focus-within:ring-2 focus-within:ring-[var(--primary)] overflow-hidden">
              {/* 背景ハイライトレイヤー (300文字超えの部分の背景を赤くする) */}
              <div 
                ref={highlightRef}
                className="absolute top-0 left-0 w-full h-40 p-3 pr-[4rem] text-sm leading-relaxed overflow-y-auto pointer-events-none custom-scrollbar text-transparent whitespace-pre-wrap break-words"
                aria-hidden="true"
              >
                <span>{editContent.slice(0, 300)}</span>
                <span className="bg-red-400/40 rounded-sm">{editContent.slice(300)}</span>
              </div>
              
              {/* 実際のテキストエリア (手前に配置、背景透明) */}
              <textarea 
                ref={textAreaRef}
                value={editContent} 
                onChange={e => setEditContent(e.target.value)} 
                onScroll={handleScroll}
                className="relative w-full h-40 p-3 pr-[4rem] text-sm leading-relaxed bg-transparent border-none outline-none text-[var(--text-main)] resize-none custom-scrollbar m-0 whitespace-pre-wrap break-words" 
                placeholder="内容を入力 (最大300文字)" 
              />
              
              <div className="absolute right-2 top-2 flex items-center gap-1 z-10">
                <button onClick={() => handlePaste(setEditContent, true)} className="p-1.5 text-[var(--text-muted)] bg-[var(--card-bg)] rounded-lg shadow-sm md:hover:text-[var(--primary-dark)] transition-colors" title="末尾に貼り付け"><Clipboard size={14}/></button>
                {editContent && <button onClick={() => setEditContent('')} className="p-1.5 text-[var(--text-muted)] bg-[var(--card-bg)] rounded-lg shadow-sm md:hover:text-red-500 transition-colors" title="クリア"><X size={14}/></button>}
              </div>
            </div>

            <div className="flex justify-between items-center mt-3">
              <span className={`text-xs font-bold ${editContent.length > 300 ? 'text-red-500' : 'text-[var(--text-muted)]'}`}>{editContent.length}/300</span>
              <div className="flex gap-2">
                <button onClick={onCancel} className="px-4 py-2 rounded-full text-sm font-bold bg-[var(--bg-color)] text-[var(--text-muted)] transition-colors md:hover:bg-[var(--sidebar-hover)]">キャンセル</button>
                <button onClick={() => onSave({ title: editTitle, content: editContent })} className="px-5 py-2 rounded-full text-sm font-bold bg-[var(--primary)] text-white shadow-sm flex items-center gap-1 transition-transform active:scale-95"><Save size={16}/>保存</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className={`flex items-center mb-4 transition-all duration-300`}>
          <div className={`bg-[var(--card-bg)] flex-1 p-5 rounded-[2rem] shadow-sm border border-[var(--border)] relative group md:hover:shadow-md transition-all`}>
            
            {!isMemoEditMode && (
              <div className="absolute top-4 right-4 flex gap-1 md:opacity-0 md:group-hover:opacity-100 transition-all duration-300">
                 <div className="relative flex items-center justify-center">
                   <button onClick={handleCopy} className="p-2 text-[var(--primary-dark)] bg-[var(--btn-bg)] rounded-full md:hover:bg-[var(--primary)] md:hover:text-white transition-colors"><Copy size={16}/></button>
                   {copied && (
                     <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-1 bg-gray-700 text-white text-[10px] font-bold px-2 py-1 rounded-lg shadow-md whitespace-nowrap animate-in fade-in slide-in-from-bottom-2 z-10 pointer-events-none">
                       コピーしました！
                       <div className="absolute -bottom-1 left-1/2 transform -translate-x-1/2 w-2 h-2 bg-gray-700 rotate-45"></div>
                     </div>
                   )}
                 </div>
                 <button onClick={onStartEdit} className="p-2 text-[var(--primary-dark)] bg-[var(--btn-bg)] rounded-full md:hover:bg-[var(--primary)] md:hover:text-white transition-colors"><Edit2 size={16}/></button>
                 <button onClick={onMove} className="p-2 text-[var(--primary-dark)] bg-[var(--btn-bg)] rounded-full md:hover:bg-[var(--primary)] md:hover:text-white transition-colors flex items-center justify-center"><FolderInput size={16}/></button>
                 <button onClick={onDelete} className="p-2 text-red-400 bg-[var(--btn-bg)] rounded-full md:hover:bg-red-500 md:hover:text-white transition-colors"><Trash2 size={16}/></button>
              </div>
            )}

            <div className={`flex items-center gap-2 mb-3 ${isMemoEditMode || displayMode === 'partial' ? 'pr-4' : 'pr-32'}`}>
              <h3 className="text-xl font-bold text-[var(--text-main)] truncate">{memo.title || '無題のメモ'}</h3>
              <div className="relative">
                <button onClick={handleFavoriteClick} className={`p-1 rounded-full transition-transform active:scale-75 ${memo.isFavorite ? 'text-yellow-400' : 'text-[var(--border)] md:hover:text-yellow-200'}`}>
                  <Star size={20} fill={memo.isFavorite ? 'currentColor' : 'none'} strokeWidth={memo.isFavorite ? 0 : 2} />
                </button>
                {showFavToast && (
                  <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-1 bg-yellow-400 text-white text-[10px] font-bold px-2 py-1 rounded-lg shadow-md whitespace-nowrap animate-in fade-in slide-in-from-bottom-2 z-10 pointer-events-none">
                    お気に入りにしました！
                    <div className="absolute -bottom-1 left-1/2 transform -translate-x-1/2 w-2 h-2 bg-yellow-400 rotate-45"></div>
                  </div>
                )}
              </div>
            </div>

            {displayMode === 'partial' ? (
               <p className="text-[var(--text-main)] text-sm truncate opacity-80">{memo.content ? memo.content.split('\n')[0] : ''}</p>
            ) : (
               <p className="whitespace-pre-wrap text-[var(--text-main)] text-sm leading-relaxed break-words">{memo.content}</p>
            )}

            <div className="flex justify-end items-center mt-4 text-[10px] text-[var(--text-main)] opacity-40 font-bold space-x-3">
              <span>{formatDate(memo.updatedAt || memo.createdAt)}</span>
              <span>{memo.content?.length || 0}/300</span>
            </div>
          </div>

          {isMemoEditMode && (
            <div className="flex flex-col items-center justify-center pl-2 gap-2 animate-in fade-in slide-in-from-right-4">
              <button onClick={() => onMoveUp(memo.id)} className="p-2 bg-[var(--btn-bg)] text-[var(--primary-dark)] rounded-full md:hover:bg-[var(--primary)] md:hover:text-white transition-colors"><ArrowUp size={16}/></button>
              <button onClick={() => onMoveDown(memo.id)} className="p-2 bg-[var(--btn-bg)] text-[var(--primary-dark)] rounded-full md:hover:bg-[var(--primary)] md:hover:text-white transition-colors"><ArrowDown size={16}/></button>
            </div>
          )}
        </div>
      );
    }

    // --- Main App ---
    function App() {
      const [items, setItems] = useState(() => {
        try {
          const saved = localStorage.getItem('memoApp_data');
          return saved ? JSON.parse(saved) : [{ id: 'root', type: 'folder', parentId: null, title: 'HOME', createdAt: Date.now() }];
        } catch { return [{ id: 'root', type: 'folder', parentId: null, title: 'HOME', createdAt: Date.now() }]; }
      });

      const [textVariables, setTextVariables] = useState(() => {
        try {
          const saved = localStorage.getItem('memoApp_textVariables');
          return saved ? JSON.parse(saved) : [{
            id: generateId(),
            placeholder: '[挨拶]',
            morningStart: '05:00',
            morningText: 'おはようございます',
            dayStart: '11:00',
            dayText: 'こんにちは',
            nightStart: '18:00',
            nightText: 'こんばんは'
          }];
        } catch { return []; }
      });

      const [selectedFolderId, setSelectedFolderId] = useState('root');
      const [theme, setTheme] = useState(() => localStorage.getItem('memoApp_theme') || 'paleblue');
      const [font, setFont] = useState(() => localStorage.getItem('memoApp_font') || 'notoSans');
      const [displayMode, setDisplayMode] = useState(() => localStorage.getItem('memoApp_displayMode') || 'full'); 
      
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [expandedFolders, setExpandedFolders] = useState({ root: true });
      
      const [editingMemoId, setEditingMemoId] = useState(null);
      const [isMemoEditMode, setIsMemoEditMode] = useState(false);
      const [showFavoritesOnly, setShowFavoritesOnly] = useState(false);
      
      const [isFolderEditMode, setIsFolderEditMode] = useState(false);
      const [showDepthError, setShowDepthError] = useState(false);
      const [toastMessage, setToastMessage] = useState('');

      // GAS Sync State
      const [gasUrl, setGasUrl] = useState(() => localStorage.getItem('memoApp_gasUrl') || '');
      const [hasSynced, setHasSynced] = useState(() => localStorage.getItem('memoApp_hasSynced') === 'true');
      const [showGasSetup, setShowGasSetup] = useState(() => (localStorage.getItem('memoApp_gasUrl') || '').trim().length > 0);
      const [autoSaveInterval, setAutoSaveInterval] = useState(() => Number(localStorage.getItem('memoApp_autoSaveInterval')) || 0);
      const [lastSavedAt, setLastSavedAt] = useState(Date.now());
      const [isSaving, setIsSaving] = useState(false);
      const [syncSuccessMsg, setSyncSuccessMsg] = useState('');
      const [syncErrorMsg, setSyncErrorMsg] = useState(''); // Added for error reporting

      // Modals
      const [folderModal, setFolderModal] = useState({ isOpen: false, type: 'create', folderId: null, name: '' });
      const [moveModal, setMoveModal] = useState({ isOpen: false, itemId: null, targetFolderId: null });
      const [themeModal, setThemeModal] = useState(false);
      const [fontModal, setFontModal] = useState(false);
      
      // Settings Screen & Sub-Modals
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [activeSettingsModal, setActiveSettingsModal] = useState(null); // 'display', 'backup'
      const [backupTab, setBackupTab] = useState('text');
      
      const [showGasInstructions, setShowGasInstructions] = useState(false);
      const [gasConsentChecked, setGasConsentChecked] = useState(false);
      const [importText, setImportText] = useState('');
      const [deleteConfirm, setDeleteConfirm] = useState({ isOpen: false, targetId: null, type: null });
      const [gasOverwriteConfirm, setGasOverwriteConfirm] = useState({ isOpen: false, pendingGasUrl: '', step: 1 }); // Safety prompt
      const [copiedId, setCopiedId] = useState(null);

      const itemsRef = useRef(items);
      const textVariablesRef = useRef(textVariables);
      
      useEffect(() => { itemsRef.current = items; }, [items]);
      useEffect(() => { textVariablesRef.current = textVariables; }, [textVariables]);

      const showToast = (msg) => { setToastMessage(''); setTimeout(() => setToastMessage(msg), 10); };

      const handleCloseSettings = () => {
        setIsSettingsOpen(false);
        if (!gasUrl.trim()) {
          setShowGasSetup(false);
          setGasConsentChecked(false);
        }
      };

      const handlePasteToSetter = async (setter) => {
        try {
          const text = await navigator.clipboard.readText();
          setter(text);
        } catch (e) {
          showToast('クリップボードの読み取りが許可されていません');
        }
      };

      // --- GAS Sync Logic ---
      const syncWithGas = async (action, targetGasUrl = gasUrl, isFirstSync = false) => {
        if (!targetGasUrl) { showToast('GASのURLを入力してください'); return; }
        
        setIsSaving(true);
        setSyncErrorMsg(''); // Clear previous errors
        try {
          const payload = {
            action: action,
            isFirstSync: isFirstSync,
            data: action === 'save' ? JSON.stringify({
              items: itemsRef.current,
              theme: theme,
              font: font,
              settings: { displayMode, autoSaveInterval },
              textVariables: textVariablesRef.current
            }) : null
          };

          const response = await fetch(targetGasUrl, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          
          const result = await response.json();
          
          if (result.status === 'success') {
            if (action === 'load' && result.data) {
              let rawData = result.data;
              try {
                if (typeof rawData === 'string') {
                  // スプレッドシート由来の意図しないエスケープ（二重引用符）を解除
                  if (rawData.startsWith('"') && rawData.endsWith('"') && rawData.includes('""')) {
                    rawData = rawData.slice(1, -1).replace(/""/g, '"');
                  }
                  // JSON文字列内に実際の改行文字等が紛れ込んでいる場合、パースエラーを防ぐためにエスケープ
                  rawData = rawData.replace(/\n/g, "\\n").replace(/\r/g, "\\r").replace(/\t/g, "\\t");
                }
                
                const parsed = JSON.parse(rawData);
                if (Array.isArray(parsed)) {
                  setItems(parsed); 
                } else {
                  if (parsed.items) setItems(parsed.items);
                  if (parsed.theme) setTheme(parsed.theme);
                  if (parsed.font) setFont(parsed.font);
                  if (parsed.settings) {
                  if (parsed.settings.displayMode) setDisplayMode(parsed.settings.displayMode);
                  if (parsed.settings.autoSaveInterval !== undefined) setAutoSaveInterval(parsed.settings.autoSaveInterval);
                }
                if (parsed.textVariables) setTextVariables(parsed.textVariables);
              }
              showToast('スプレッドシートから読み込みました');
                setSyncSuccessMsg('読込完了！');
                setTimeout(() => setSyncSuccessMsg(''), 3000);
              } catch(e) { 
                console.error('Parse Error:', e);
                setSyncErrorMsg(`データ解析エラー: ${e.message}\n\n対象データ:\n${rawData}`);
                showToast(`データ解析エラー`); 
              }
            } else if (action === 'save') {
              setLastSavedAt(Date.now());
              showToast('スプレッドシートへ保存しました');
              setSyncSuccessMsg('保存完了！');
              setTimeout(() => setSyncSuccessMsg(''), 3000);
            } else if (action === 'load' && !result.data) {
              showToast('サーバーにデータがありません');
            } else {
              // General success
            }
            
            setHasSynced(true);
            localStorage.setItem('memoApp_hasSynced', 'true');
            localStorage.setItem('memoApp_gasUrl', targetGasUrl);
            setGasUrl(targetGasUrl);
          } else {
            setSyncErrorMsg('通信エラー: ' + (result.message || '不明なエラー'));
            showToast('通信エラーが発生しました');
          }
        } catch (e) {
          console.error(e);
          setSyncErrorMsg(`通信エラー: ${e.message}`);
          showToast(`通信エラーが発生しました`);
        } finally {
          setIsSaving(false);
        }
      };

      const handleInitialSaveClick = async () => {
        if (!gasUrl) { showToast('GASのURLを入力してください'); return; }
        setIsSaving(true);
        setSyncErrorMsg('');
        try {
          const response = await fetch(gasUrl, {
            method: 'POST',
            body: JSON.stringify({ action: 'check' }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          const result = await response.json();
          if (result.status === 'success' && result.hasData) {
            setGasOverwriteConfirm({ isOpen: true, pendingGasUrl: gasUrl, step: 1 });
          } else {
            // No data on server, safe to append
            syncWithGas('save', gasUrl, true);
          }
        } catch (e) {
          setSyncErrorMsg(`通信エラー。URLを確認してください。\n${e.message}`);
          showToast('通信エラーが発生しました');
        } finally {
          setIsSaving(false);
        }
      };

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const paramGas = urlParams.get('gas');
        
        if (paramGas && paramGas !== gasUrl) {
          setGasUrl(paramGas);
        }
      }, []);

      useEffect(() => { localStorage.setItem('memoApp_data', JSON.stringify(items)); }, [items]);
      useEffect(() => { localStorage.setItem('memoApp_textVariables', JSON.stringify(textVariables)); }, [textVariables]);
      useEffect(() => { localStorage.setItem('memoApp_theme', theme); document.documentElement.setAttribute('data-theme', theme); }, [theme]);
      useEffect(() => { localStorage.setItem('memoApp_font', font); document.documentElement.setAttribute('data-font', font); }, [font]);
      useEffect(() => { localStorage.setItem('memoApp_displayMode', displayMode); }, [displayMode]);
      useEffect(() => { localStorage.setItem('memoApp_autoSaveInterval', autoSaveInterval); }, [autoSaveInterval]);

      useEffect(() => {
        if (autoSaveInterval > 0 && gasUrl && hasSynced) {
          const timer = setInterval(() => {
            if (Date.now() - lastSavedAt >= autoSaveInterval * 60000) syncWithGas('save', gasUrl, false);
          }, 30000);
          return () => clearInterval(timer);
        }
      }, [autoSaveInterval, gasUrl, hasSynced, lastSavedAt, items, theme, font, displayMode]); 

      const handleExportText = async () => {
        const data = JSON.stringify({ items, theme, font, settings: { displayMode, autoSaveInterval }, textVariables }, null, 2);
        
        // Web Share API を使用して共有シートを表示 (対応ブラウザのみ)
        if (navigator.share) {
          try {
            await navigator.share({
              title: 'foglia バックアップデータ',
              text: data
            });
            return; // 共有シートが正常に開いた場合はここで終了
          } catch (e) {
            // キャンセルされた場合は何もしない。それ以外のエラーならクリップボードへ。
            if (e.name === 'AbortError') return;
            console.log('Share API error, fallback to clipboard', e);
          }
        }

        // 共有シートに非対応の場合、またはエラー時のフォールバック（クリップボードコピー）
        const textArea = document.createElement("textarea");
        textArea.value = data;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        textArea.remove();
        setCopiedId('export');
        setTimeout(() => setCopiedId(null), 2000);
      };

      const handleImportText = () => {
        try {
          const data = JSON.parse(importText);
          if (Array.isArray(data)) {
            setItems(data); 
          } else {
            if (data.items) setItems(data.items);
            if (data.theme) setTheme(data.theme);
            if (data.font) setFont(data.font);
            if (data.settings) {
              if (data.settings.displayMode) setDisplayMode(data.settings.displayMode);
              if (data.settings.autoSaveInterval !== undefined) setAutoSaveInterval(data.settings.autoSaveInterval);
            }
            if (data.textVariables) setTextVariables(data.textVariables);
          }
          showToast('データを読み込みました');
          setImportText('');
          setActiveSettingsModal(null);
        } catch { showToast('データ形式が正しくありません'); }
      };

      const getFolderDepth = (id, itemsArray = items) => {
        if (id === 'root' || !id) return 0;
        let d = 1, curr = itemsArray.find(i => i.id === id);
        const safetyLimit = 20; let count = 0;
        while (curr && curr.parentId !== 'root' && curr.parentId !== null && count < safetyLimit) {
          count++; const parent = itemsArray.find(i => i.id === curr.parentId);
          if (!parent) break; d++; curr = parent;
        }
        return d;
      };

      const handleAddFolder = () => {
        const name = folderModal.name.trim();
        if (!name) return;
        setItems(prev => {
          if (folderModal.type === 'create') {
            const nid = generateId();
            const newState = [...prev, { id: nid, type: 'folder', parentId: selectedFolderId, title: name, createdAt: Date.now() }];
            setTimeout(() => { setExpandedFolders(ex => ({ ...ex, [selectedFolderId]: true })); setSelectedFolderId(nid); }, 10);
            return newState;
          } else {
            return prev.map(i => i.id === folderModal.folderId ? { ...i, title: name } : i);
          }
        });
        setFolderModal({ isOpen: false, type: 'create', folderId: null, name: '' });
      };

      const handleAddMemo = () => {
        const nid = generateId();
        setItems(prev => [{ id: nid, type: 'note', parentId: selectedFolderId, title: '', content: '', isFavorite: false, createdAt: Date.now(), updatedAt: Date.now() }, ...prev]);
        setEditingMemoId(nid);
        setIsMemoEditMode(false); 
      };

      const handleAddVariable = () => {
        setTextVariables(prev => [...prev, {
          id: generateId(),
          placeholder: '',
          morningStart: '05:00',
          morningText: '',
          dayStart: '11:00',
          dayText: '',
          nightStart: '18:00',
          nightText: ''
        }]);
      };

      const updateVariable = (id, field, value) => {
        setTextVariables(prev => prev.map(v => v.id === id ? { ...v, [field]: value } : v));
      };

      const handleDeleteVariable = (id) => {
        setTextVariables(prev => prev.filter(v => v.id !== id));
      };

      const executeDelete = () => {
        setItems(prev => {
          if (deleteConfirm.type === 'folder') {
            const ids = new Set([deleteConfirm.targetId]);
            let size = 0;
            while (ids.size > size) { size = ids.size; prev.forEach(i => { if (ids.has(i.parentId)) ids.add(i.id); }); }
            if (ids.has(selectedFolderId)) setSelectedFolderId('root');
            return prev.filter(i => !ids.has(i.id));
          } else {
            return prev.filter(i => i.id !== deleteConfirm.targetId);
          }
        });
        setDeleteConfirm({ isOpen: false, targetId: null, type: null });
        showToast('削除しました');
      };

      const swapElements = (arr, idx1, idx2) => {
        const newArr = [...arr];
        const temp = newArr[idx1];
        newArr[idx1] = newArr[idx2];
        newArr[idx2] = temp;
        return newArr;
      };

      const handleFolderMoveOrder = (id, dir) => {
        setItems(prev => {
          const idx = prev.findIndex(i => i.id === id);
          if (idx === -1) return prev;
          const target = prev[idx];
          const siblings = prev.filter(i => i.type === 'folder' && i.parentId === target.parentId);
          const sidx = siblings.findIndex(i => i.id === id);
          if (dir === 'up' && sidx > 0) {
            return swapElements(prev, idx, prev.findIndex(i => i.id === siblings[sidx - 1].id));
          } else if (dir === 'down' && sidx < siblings.length - 1) {
            return swapElements(prev, idx, prev.findIndex(i => i.id === siblings[sidx + 1].id));
          }
          return prev;
        });
      };

      const handleFolderIndent = (id, dir) => {
        setItems(prev => {
          const idx = prev.findIndex(i => i.id === id);
          if (idx === -1) return prev;
          const target = prev[idx];
          const siblings = prev.filter(i => i.type === 'folder' && i.parentId === target.parentId);
          const sidx = siblings.findIndex(i => i.id === id);

          if (dir === 'in' && sidx > 0) {
            const prevSibling = siblings[sidx - 1];
            if (getFolderDepth(prevSibling.id, prev) >= 5) {
                showToast('これ以上階層を深くできません');
                return prev;
            }
            const nextItems = [...prev];
            nextItems[idx] = { ...target, parentId: prevSibling.id };
            setExpandedFolders(ex => ({ ...ex, [prevSibling.id]: true }));
            return nextItems;
          } else if (dir === 'out' && target.parentId !== 'root') {
            const parentFolder = prev.find(i => i.id === target.parentId);
            if (parentFolder) {
              const nextItems = [...prev];
              nextItems[idx] = { ...target, parentId: parentFolder.parentId };
              return nextItems;
            }
          }
          return prev;
        });
      };

      const handleMemoMoveOrder = (id, dir) => {
        setItems(prev => {
          const idx = prev.findIndex(i => i.id === id);
          if (idx === -1) return prev;
          const siblings = prev.filter(i => i.type === 'note' && i.parentId === selectedFolderId && (!showFavoritesOnly || i.isFavorite));
          const sidx = siblings.findIndex(i => i.id === id);
          if (dir === 'up' && sidx > 0) {
            return swapElements(prev, idx, prev.findIndex(i => i.id === siblings[sidx - 1].id));
          } else if (dir === 'down' && sidx < siblings.length - 1) {
            return swapElements(prev, idx, prev.findIndex(i => i.id === siblings[sidx + 1].id));
          }
          return prev;
        });
      };

      const FolderTreeItem = ({ item, level, isSelectMode = false, onSelect = null, currentTargetId = null }) => {
        const hasChildren = items.some(i => i.type === 'folder' && i.parentId === item.id);
        const isExpanded = expandedFolders[item.id] || isSelectMode;
        const isSelected = isSelectMode ? currentTargetId === item.id : selectedFolderId === item.id;
        const memoCount = items.filter(i => i.type === 'note' && i.parentId === item.id).length;

        return (
          <div className="font-bold">
            <div 
              className={`flex items-center py-2 px-3 mx-2 my-0.5 rounded-2xl cursor-pointer transition-all ${isSelected ? 'bg-[var(--sidebar-active)] text-white shadow-md' : 'md:hover:bg-[var(--sidebar-hover)] text-[var(--sidebar-text)]'}`}
              style={{ paddingLeft: `${level * 1.25 + 0.5}rem` }}
              onClick={() => isSelectMode ? onSelect(item.id) : setSelectedFolderId(item.id)}
            >
              <button className="p-1 mr-1 rounded-full md:hover:bg-black/10 transition-colors" onClick={(e) => { e.stopPropagation(); setExpandedFolders(ex => ({...ex, [item.id]: !isExpanded})); }}>
                {hasChildren ? (isExpanded ? <ChevronDown size={14}/> : <ChevronRight size={14}/>) : <span className="w-3.5"/>}
              </button>
              <div className="flex-1 min-w-0 flex items-center justify-between">
                <div className="flex items-center min-w-0 pr-2">
                  {isSelected ? <FolderOpen size={18} className="mr-2 shrink-0"/> : <Folder size={18} className={`mr-2 opacity-70 shrink-0 ${isSelected ? 'text-white' : 'text-[var(--primary-dark)]'}`}/>}
                  <span className="truncate text-sm">{item.title}</span>
                </div>
                <div className={`flex items-center text-[10px] font-bold shrink-0 px-1.5 py-0.5 rounded-full ${isSelected ? 'bg-white/20 text-white' : 'bg-[var(--border)]/50 text-[var(--text-muted)]'}`}>
                  <FileText size={10} className="mr-0.5" />
                  <span>{memoCount}</span>
                </div>
              </div>
            </div>
            {isExpanded && hasChildren && (
              <div className="relative">
                 <div className="absolute left-[1.4rem] top-0 bottom-0 w-[1.5px] bg-[var(--border)] opacity-30"></div>
                 {items.filter(i => i.type === 'folder' && i.parentId === item.id).map(child => <FolderTreeItem key={child.id} item={child} level={level + 1} isSelectMode={isSelectMode} onSelect={onSelect} currentTargetId={currentTargetId} />)}
              </div>
            )}
          </div>
        );
      };

      const FolderEditTreeItem = ({ item, level }) => {
        const hasChildren = items.some(i => i.type === 'folder' && i.parentId === item.id);
        const isExpanded = expandedFolders[item.id];
        const siblings = items.filter(i => i.type === 'folder' && i.parentId === item.parentId);
        const sidx = siblings.findIndex(i => i.id === item.id);

        return (
          <div className="font-bold">
            <div 
              className={`flex flex-col lg:flex-row lg:items-center justify-between py-3 px-3 mx-2 my-2 rounded-2xl bg-[var(--card-bg)] border border-[var(--border)] shadow-sm gap-2 lg:gap-0`}
              style={{ marginLeft: `${level * 1.5}rem` }}
            >
              <div className="flex items-center flex-1 min-w-0 pr-2">
                <button className="p-1 mr-1 rounded-full md:hover:bg-black/10 transition-colors shrink-0" onClick={(e) => { e.stopPropagation(); setExpandedFolders(ex => ({...ex, [item.id]: !isExpanded})); }}>
                  {hasChildren ? (isExpanded ? <ChevronDown size={14}/> : <ChevronRight size={14}/>) : <span className="w-3.5"/>}
                </button>
                <Folder size={18} className="mr-2 opacity-70 shrink-0 text-[var(--primary-dark)]"/>
                <span className="truncate text-sm text-[var(--text-main)] mr-2">{item.title}</span>
              </div>

              <div className="flex items-center gap-0.5 sm:gap-1 shrink-0 overflow-x-auto pb-1 lg:pb-0 w-full lg:w-auto custom-scrollbar">
                <button onClick={() => handleFolderIndent(item.id, 'out')} disabled={item.parentId === 'root'} className={`p-1.5 sm:p-2 rounded-full md:hover:bg-[var(--btn-bg)] text-[var(--primary-dark)] transition-colors shrink-0 ${item.parentId === 'root' ? 'opacity-20 cursor-not-allowed' : ''}`} title="左へ移動 (階層上げる)"><ArrowLeft size={16}/></button>
                <button onClick={() => handleFolderIndent(item.id, 'in')} disabled={sidx === 0} className={`p-1.5 sm:p-2 rounded-full md:hover:bg-[var(--btn-bg)] text-[var(--primary-dark)] transition-colors shrink-0 ${sidx === 0 ? 'opacity-20 cursor-not-allowed' : ''}`} title="右へ移動 (子フォルダにする)"><ArrowRight size={16}/></button>
                
                <div className="w-px h-5 bg-[var(--border)] mx-1 shrink-0" />
                
                <button onClick={() => handleFolderMoveOrder(item.id, 'up')} disabled={sidx === 0} className={`p-1.5 sm:p-2 rounded-full md:hover:bg-[var(--btn-bg)] text-[var(--primary-dark)] transition-colors shrink-0 ${sidx === 0 ? 'opacity-20 cursor-not-allowed' : ''}`} title="上へ移動"><ArrowUp size={16}/></button>
                <button onClick={() => handleFolderMoveOrder(item.id, 'down')} disabled={sidx === siblings.length - 1} className={`p-1.5 sm:p-2 rounded-full md:hover:bg-[var(--btn-bg)] text-[var(--primary-dark)] transition-colors shrink-0 ${sidx === siblings.length - 1 ? 'opacity-20 cursor-not-allowed' : ''}`} title="下へ移動"><ArrowDown size={16}/></button>

                <div className="w-px h-5 bg-[var(--border)] mx-1 shrink-0" />

                <button onClick={() => setFolderModal({ isOpen: true, type: 'edit', folderId: item.id, name: item.title })} className="p-1.5 sm:p-2 rounded-full md:hover:bg-[var(--btn-bg)] text-[var(--primary-dark)] transition-colors shrink-0" title="名前を変更"><Edit2 size={16}/></button>
                <button onClick={() => setDeleteConfirm({ isOpen: true, targetId: item.id, type: 'folder' })} className="p-1.5 sm:p-2 rounded-full md:hover:bg-[var(--btn-bg)] text-red-400 transition-colors shrink-0" title="削除"><Trash2 size={16}/></button>
              </div>
            </div>
            {isExpanded && hasChildren && (
              <div className="relative">
                 {items.filter(i => i.type === 'folder' && i.parentId === item.id).map(child => <FolderEditTreeItem key={child.id} item={child} level={level + 1} />)}
              </div>
            )}
          </div>
        );
      };

      const visibleMemos = items.filter(i => i.type === 'note' && i.parentId === selectedFolderId && (!showFavoritesOnly || i.isFavorite));

      return (
        <>
          <style>{themeCSS}</style>
          <div 
            className="flex overflow-hidden selection:bg-[var(--primary)] selection:text-white relative w-full"
            style={{
              height: '100dvh',
              paddingTop: 'env(safe-area-inset-top)',
              paddingBottom: 'env(safe-area-inset-bottom)',
              paddingLeft: 'env(safe-area-inset-left)',
              paddingRight: 'env(safe-area-inset-right)'
            }}
          >
            
            {/* --- Mobile Sidebar Overlay --- */}
            {isSidebarOpen && (
              <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-30 md:hidden transition-opacity duration-300" onClick={() => setIsSidebarOpen(false)} />
            )}

            {/* --- Sidebar --- */}
            <div className={`fixed inset-y-0 left-0 z-40 w-80 md:relative md:translate-x-0 transform transition-transform duration-300 ease-in-out bg-[var(--sidebar-bg)] border-r border-[var(--border)] flex flex-col shadow-lg md:shadow-none ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
              <div className="p-5 border-b border-[var(--border)] flex justify-between items-center bg-white/20">
                <h1 className="font-bold flex items-center gap-2 text-[var(--primary-text)] text-2xl tracking-tight" style={{ fontFamily: "'Comfortaa', sans-serif" }}>
                  <Leaf size={24} className="text-[var(--primary-dark)]"/>foglia
                </h1>
                <button onClick={() => setIsSidebarOpen(false)} className="md:hidden p-2 bg-[var(--card-bg)] rounded-full text-[var(--primary-dark)] shadow-sm md:hover:scale-105 active:scale-95 transition-all"><ChevronLeft size={24}/></button>
              </div>
              
              <div className="flex-1 overflow-y-auto py-3 custom-scrollbar">
                <div className="font-bold">
                  <div 
                    className={`flex items-center py-2 px-3 mx-2 my-0.5 rounded-2xl cursor-pointer transition-all ${selectedFolderId === 'root' ? 'bg-[var(--sidebar-active)] text-white shadow-md' : 'md:hover:bg-[var(--sidebar-hover)] text-[var(--sidebar-text)]'}`}
                    style={{ paddingLeft: '0.5rem' }}
                    onClick={() => setSelectedFolderId('root')}
                  >
                    <div className="p-1 mr-1 shrink-0 w-5.5 h-5.5"></div>
                    <div className="flex-1 min-w-0 flex items-center justify-between">
                      <div className="flex items-center min-w-0 pr-2">
                        <Home size={18} className={`mr-2 shrink-0 ${selectedFolderId === 'root' ? 'text-white' : 'text-[var(--primary-dark)]'}`}/>
                        <span className="text-sm">HOME</span>
                      </div>
                      <div className={`flex items-center text-[10px] font-bold shrink-0 px-1.5 py-0.5 rounded-full ${selectedFolderId === 'root' ? 'bg-white/20 text-white' : 'bg-[var(--border)]/50 text-[var(--text-muted)]'}`}>
                        <FileText size={10} className="mr-0.5" />

                        </div>
                      </div>
                    </div>
                    <div className="space-y-1">
                      {items.filter(i => i.type === 'folder' && i.parentId === 'root').map(folder => (
                        <FolderTreeItem 
                          key={folder.id} item={folder} level={0} isSelectMode={true} 
                          onSelect={(id) => setMoveModal(m => ({ ...m, targetFolderId: id }))}
                          currentTargetId={moveModal.targetFolderId}
                        />
                      ))}
                    </div>
                  </div>
                  <div className="flex gap-4 px-2">
                    <button onClick={() => setMoveModal({ isOpen: false, itemId: null, targetFolderId: null })} className="flex-1 py-4 rounded-2xl font-bold bg-[var(--bg-color)] text-[var(--text-muted)] md:hover:bg-[var(--sidebar-hover)] transition-all">キャンセル</button>
                    <button onClick={() => {
                      setItems(prev => prev.map(i => i.id === moveModal.itemId ? { ...i, parentId: moveModal.targetFolderId } : i));
                      setMoveModal({ isOpen: false, itemId: null, targetFolderId: null }); showToast('移動が完了しました');
                    }} className="flex-1 py-4 rounded-2xl font-bold bg-[var(--primary)] text-white shadow-lg transition-all active:scale-95">移動する</button>
                  </div>
                </div>
              </div>
            )}

            {themeModal && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4" onClick={() => setThemeModal(false)}>
                <div className="bg-[var(--card-bg)] rounded-[2.5rem] shadow-2xl w-full max-w-sm p-6 border border-[var(--border)]" onClick={e => e.stopPropagation()}>
                  <div className="flex justify-between items-center mb-8 px-4"><h2 className="text-xl font-bold flex items-center gap-3 text-[var(--text-main)]"><Palette size={24} className="text-[var(--primary-dark)]"/>テーマ設定</h2><button onClick={() => setThemeModal(false)} className="p-2 bg-[var(--bg-color)] rounded-full text-[var(--modal-close)] md:hover:text-red-500 transition-all"><X size={24}/></button></div>
                  <div className="space-y-3">
                    {themes.map(t => (
                      <button key={t.id} onClick={() => setTheme(t.id)} className={`w-full flex items-center justify-between p-5 rounded-[1.5rem] border-2 transition-all ${theme === t.id ? 'border-[var(--primary)] bg-[var(--sidebar-bg)] shadow-md scale-[1.02]' : 'border-transparent bg-[var(--bg-color)] md:hover:bg-white/60'}`}>
                        <div className="flex items-center gap-4"><div className="w-8 h-8 rounded-full shadow-inner border-2 border-white" style={{ backgroundColor: t.color }} /><span className="font-bold text-sm text-[var(--text-main)]">{t.name}</span></div>
                        {theme === t.id && <Check size={24} className="text-[var(--primary-dark)]"/>}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {fontModal && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4" onClick={() => setFontModal(false)}>
                <div className="bg-[var(--card-bg)] rounded-[2.5rem] shadow-2xl w-full max-w-sm p-6 border border-[var(--border)]" onClick={e => e.stopPropagation()}>
                  <div className="flex justify-between items-center mb-8 px-4"><h2 className="text-xl font-bold flex items-center gap-3 text-[var(--text-main)]"><Type size={24} className="text-[var(--primary-dark)]"/>フォント設定</h2><button onClick={() => setFontModal(false)} className="p-2 bg-[var(--bg-color)] rounded-full text-[var(--modal-close)] md:hover:text-red-500 transition-all"><X size={24}/></button></div>
                  <div className="space-y-3">
                    {fonts.map(f => (
                      <button key={f.id} onClick={() => setFont(f.id)} className={`w-full flex items-center justify-between p-5 rounded-[1.5rem] border-2 transition-all ${font === f.id ? 'border-[var(--primary)] bg-[var(--sidebar-bg)] shadow-md scale-[1.02]' : 'border-transparent bg-[var(--bg-color)] md:hover:bg-white/60'}`}>
                        <span className="font-bold text-sm text-[var(--text-main)]" style={{ fontFamily: f.family }}>{f.name}</span>
                        {font === f.id && <Check size={24} className="text-[var(--primary-dark)]"/>}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {deleteConfirm.isOpen && (
              <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[200] flex items-center justify-center p-4" onClick={() => setDeleteConfirm({ isOpen: false, targetId: null, type: null })}>
                <div className="bg-[var(--card-bg)] rounded-[3rem] shadow-2xl w-full max-w-sm p-10 text-center border-t-4 border-red-500 transform transition-all animate-in fade-in zoom-in duration-200" onClick={e => e.stopPropagation()}>
                  <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500 shadow-inner"><Trash2 size={40} /></div>
                  <h2 className="text-2xl font-bold mb-4 text-[var(--text-main)]">削除しますか？</h2>
                  <p className="text-sm text-[var(--text-muted)] mb-10 leading-relaxed font-bold">この操作は取り消せません。</p>
                  <div className="flex flex-col gap-3">
                    <button onClick={executeDelete} className="w-full py-4 rounded-2xl font-bold bg-red-500 text-white shadow-lg md:hover:bg-red-600 transition-all">削除する</button>
                    <button onClick={() => setDeleteConfirm({ isOpen: false, targetId: null, type: null })} className="w-full py-4 rounded-2xl font-bold bg-[var(--bg-color)] text-[var(--text-muted)] md:hover:bg-[var(--sidebar-hover)] transition-all">キャンセル</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
